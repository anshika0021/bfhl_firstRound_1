<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BFHL — Node Hierarchy Explorer</title>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --border: #252a35;
    --accent: #4f8ef7;
    --accent2: #a78bfa;
    --success: #34d399;
    --warn: #f59e0b;
    --danger: #f87171;
    --text: #e2e8f0;
    --muted: #64748b;
    --radius: 10px;
    --font: 'Inter', system-ui, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .container { max-width: 860px; margin: 0 auto; }

  /* Header */
  header { margin-bottom: 2.5rem; }
  header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header p { color: var(--muted); font-size: 0.85rem; margin-top: 0.3rem; }

  /* Input area */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }
  label { font-size: 0.78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 0.6rem; }
  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.85rem;
    padding: 0.9rem 1rem;
    resize: vertical;
    min-height: 120px;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent); }
  .hint { font-size: 0.75rem; color: var(--muted); margin-top: 0.5rem; }

  /* URL config */
  .url-row { display: flex; gap: 0.75rem; margin-bottom: 1rem; align-items: center; }
  input[type="text"] {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.82rem;
    padding: 0.6rem 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }

  button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 0.7rem 1.8rem;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  button:hover { opacity: 0.88; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Error banner */
  .error-banner {
    background: #2d1515;
    border: 1px solid var(--danger);
    border-radius: var(--radius);
    color: var(--danger);
    padding: 0.9rem 1.2rem;
    font-size: 0.85rem;
    margin-bottom: 1.5rem;
    display: none;
  }

  /* Response sections */
  .section-title {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 0.8rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  /* Identity chips */
  .meta-grid { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-bottom: 1.5rem; }
  .chip {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.35rem 0.7rem;
    font-size: 0.78rem;
    font-family: var(--mono);
  }
  .chip span { color: var(--muted); margin-right: 0.3rem; }

  /* Hierarchy cards */
  .hier-grid { display: grid; gap: 0.9rem; }
  .hier-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.1rem 1.2rem;
    position: relative;
  }
  .hier-card.cycle { border-color: #7c3aed44; background: #1a1525; }
  .hier-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    padding: 0.2rem 0.55rem;
    border-radius: 4px;
    margin-bottom: 0.6rem;
  }
  .tag-tree { background: #0f2a1f; color: var(--success); }
  .tag-cycle { background: #1a103a; color: var(--accent2); }
  .hier-root { font-size: 1.2rem; font-weight: 700; font-family: var(--mono); margin-bottom: 0.4rem; color: var(--accent); }
  .hier-depth { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.7rem; }
  .tree-view {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.7rem 1rem;
    font-family: var(--mono);
    font-size: 0.78rem;
    line-height: 1.7;
    color: var(--text);
    white-space: pre;
    overflow-x: auto;
  }

  /* Invalid / Duplicate pills */
  .pill-list { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
  .pill {
    font-family: var(--mono);
    font-size: 0.78rem;
    padding: 0.25rem 0.6rem;
    border-radius: 5px;
  }
  .pill-invalid { background: #2d1515; color: var(--danger); border: 1px solid #5c2121; }
  .pill-dup { background: #2a1f0f; color: var(--warn); border: 1px solid #5c3d10; }
  .pill-empty { color: var(--muted); font-size: 0.8rem; }

  /* Summary */
  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.8rem; margin-top: 0.5rem; }
  .stat-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.9rem 1rem;
    text-align: center;
  }
  .stat-val { font-size: 1.6rem; font-weight: 800; font-family: var(--mono); color: var(--accent); }
  .stat-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 0.2rem; }

  /* Loader */
  .loader {
    display: none;
    text-align: center;
    padding: 2rem;
    color: var(--muted);
    font-size: 0.85rem;
  }
  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 0.5rem;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
  <header>
    <h1>Node Hierarchy Explorer</h1>
    <p>BFHL Full Stack Challenge — Bajaj Finserv Health</p>
  </header>

  <div class="card">
    <label>API Base URL</label>
    <div class="url-row">
      <input type="text" id="apiUrl" value="https://YOUR-APP.onrender.com" placeholder="https://your-api.onrender.com" />
    </div>
    <label>Node Edges</label>
    <textarea id="nodeInput" placeholder='A->B, A->C, B->D, X->Y, Y->Z, Z->X, hello, 1->2'></textarea>
    <div class="hint">Enter edges as comma or newline separated: A->B, A->C, B->D …</div>
    <br/>
    <button id="submitBtn" onclick="submitData()">Run Analysis</button>
  </div>

  <div class="error-banner" id="errorBanner"></div>
  <div class="loader" id="loader"><span class="spinner"></span>Calling API…</div>
  <div id="results"></div>
</div>

<script>
function parseInput(raw) {
  return raw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);
}

function renderTree(obj, prefix = "", isLast = true) {
  const keys = Object.keys(obj);
  let out = "";
  keys.forEach((key, i) => {
    const last = i === keys.length - 1;
    out += prefix + (isLast ? "" : "") + (last ? "└── " : "├── ") + key + "\n";
    out += renderTree(obj[key], prefix + (last ? "    " : "│   "), last);
  });
  return out;
}

function buildTreeStr(tree) {
  const rootKey = Object.keys(tree)[0];
  let out = rootKey + "\n";
  out += renderTree(tree[rootKey], "", true);
  return out.trimEnd();
}

async function submitData() {
  const rawInput = document.getElementById("nodeInput").value.trim();
  const apiUrl = document.getElementById("apiUrl").value.trim().replace(/\/$/, "");
  const btn = document.getElementById("submitBtn");
  const loader = document.getElementById("loader");
  const errorBanner = document.getElementById("errorBanner");
  const results = document.getElementById("results");

  if (!rawInput) { showError("Please enter at least one edge."); return; }
  if (!apiUrl || apiUrl.includes("YOUR-APP")) { showError("Please update the API URL above with your deployed URL."); return; }

  errorBanner.style.display = "none";
  results.innerHTML = "";
  loader.style.display = "block";
  btn.disabled = true;

  const data = parseInput(rawInput);

  try {
    const res = await fetch(`${apiUrl}/bfhl`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ data })
    });

    if (!res.ok) {
      const errText = await res.text();
      throw new Error(`HTTP ${res.status}: ${errText}`);
    }

    const json = await res.json();
    loader.style.display = "none";
    btn.disabled = false;
    renderResults(json);
  } catch (err) {
    loader.style.display = "none";
    btn.disabled = false;
    showError("API call failed: " + err.message);
  }
}

function showError(msg) {
  const eb = document.getElementById("errorBanner");
  eb.textContent = "⚠ " + msg;
  eb.style.display = "block";
}

function renderResults(data) {
  const el = document.getElementById("results");

  // Meta
  let html = `<div class="card">
    <div class="section-title">Identity</div>
    <div class="meta-grid">
      <div class="chip"><span>user_id</span>${data.user_id}</div>
      <div class="chip"><span>email</span>${data.email_id}</div>
      <div class="chip"><span>roll</span>${data.college_roll_number}</div>
    </div>`;

  // Hierarchies
  html += `<div class="section-title">Hierarchies (${data.hierarchies.length})</div>
    <div class="hier-grid">`;

  data.hierarchies.forEach(h => {
    if (h.has_cycle) {
      html += `<div class="hier-card cycle">
        <div class="hier-tag tag-cycle">⟳ Cyclic</div>
        <div class="hier-root">${h.root}</div>
        <div class="hier-depth">Cycle detected — no tree structure</div>
      </div>`;
    } else {
      const treeStr = buildTreeStr(h.tree);
      html += `<div class="hier-card">
        <div class="hier-tag tag-tree">✓ Tree</div>
        <div class="hier-root">${h.root}</div>
        <div class="hier-depth">Depth: ${h.depth}</div>
        <div class="tree-view">${escHtml(treeStr)}</div>
      </div>`;
    }
  });

  html += `</div></div>`;

  // Invalid + Duplicate
  html += `<div class="card">
    <div class="section-title">Invalid Entries</div>
    <div class="pill-list">`;
  if (data.invalid_entries.length === 0) {
    html += `<span class="pill-empty">None</span>`;
  } else {
    data.invalid_entries.forEach(e => {
      html += `<span class="pill pill-invalid">${escHtml(e)}</span>`;
    });
  }
  html += `</div><br/><div class="section-title">Duplicate Edges</div><div class="pill-list">`;
  if (data.duplicate_edges.length === 0) {
    html += `<span class="pill-empty">None</span>`;
  } else {
    data.duplicate_edges.forEach(e => {
      html += `<span class="pill pill-dup">${escHtml(e)}</span>`;
    });
  }
  html += `</div></div>`;

  // Summary
  html += `<div class="card">
    <div class="section-title">Summary</div>
    <div class="summary-grid">
      <div class="stat-box">
        <div class="stat-val">${data.summary.total_trees}</div>
        <div class="stat-label">Valid Trees</div>
      </div>
      <div class="stat-box">
        <div class="stat-val">${data.summary.total_cycles}</div>
        <div class="stat-label">Cycles</div>
      </div>
      <div class="stat-box">
        <div class="stat-val">${data.summary.largest_tree_root || '—'}</div>
        <div class="stat-label">Largest Root</div>
      </div>
    </div>
  </div>`;

  el.innerHTML = html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
